name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '5.0.x'
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore
    #- name: Test
      #run: dotnet test --no-restore --verbosity normal
      #run: dotnet test /p:CollectCoverage=true /p:Exclude="[xunit*]\*" /p:CoverletOutput="./TestResults/" --no-restore --verbosity normal
    #- name: Upload code coverage
    #  run: bash <(curl -s https://codecov.io/bash)
    - name: Generate Coverage Report
      run: |
        printenv
        dotnet test /p:CollectCoverage=true /p:CoverletOutputFormat=lcov /p:Exclude="[xunit*]\*" /p:CoverletOutput="./TestResults/"
    - name: Publish Coverage Report
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: ./tests/xuno/TestResults/coverage.info